<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>发布监拆订单</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 5G 🔋</span>
  </div>
  <div class="header">
    <a class="header-back" href="index.html">‹</a>
    <span class="header-title">发布监拆订单</span>
    <span class="header-action"></span>
  </div>

  <div class="scroll-area" style="padding:12px 14px">
    <!-- 案件信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">案件信息</div>
      <div class="form-item">
        <label class="form-label">报案号</label>
        <input class="form-input" type="text" placeholder="请输入报案号">
      </div>
      <div class="form-item">
        <label class="form-label">保险公司</label>
        <div class="form-select" onclick="showToast('选择保险公司')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">出险日期</label>
        <input class="form-input" type="date">
      </div>
      <div class="form-item">
        <label class="form-label">出险地点</label>
        <input class="form-input" type="text" placeholder="请输入出险地点">
      </div>
    </div>

    <!-- 车辆信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">车辆信息</div>
      <div class="form-item">
        <label class="form-label">车牌号</label>
        <input class="form-input" type="text" placeholder="请输入车牌号">
      </div>
      <div class="form-item">
        <label class="form-label">车辆品牌</label>
        <div class="form-select" onclick="showToast('选择品牌')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">车辆型号</label>
        <input class="form-input" type="text" placeholder="请输入车辆型号">
      </div>
      <div class="form-item">
        <label class="form-label">车架号</label>
        <input class="form-input" type="text" placeholder="请输入VIN码">
      </div>
    </div>

    <!-- 修理厂信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">修理厂信息</div>
      <div class="form-item">
        <label class="form-label">修理厂</label>
        <div class="form-select" onclick="showToast('选择修理厂')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">联系人</label>
        <input class="form-input" type="text" placeholder="请输入联系人">
      </div>
      <div class="form-item">
        <label class="form-label">联系电话</label>
        <input class="form-input" type="tel" placeholder="请输入联系电话">
      </div>
    </div>

    <!-- 定损信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">定损信息</div>
      <div class="form-item">
        <label class="form-label">定损员</label>
        <div class="form-select" onclick="showToast('选择定损员')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">损失类型</label>
        <div class="form-select" onclick="showToast('选择损失类型')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">预估金额</label>
        <input class="form-input" type="number" placeholder="请输入预估金额">
      </div>
    </div>

    <!-- 审批人 -->
    <div class="card" style="margin:0 0 80px 0">
      <div class="card-title">审批信息</div>
      <div class="form-item">
        <label class="form-label">审批人</label>
        <div class="form-select" onclick="showToast('选择审批人')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">备注</label>
        <textarea class="form-textarea" placeholder="填写备注信息（选填）"></textarea>
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn btn-full btn-primary" onclick="showToast('监拆订单已发布！');location.href='index.html'">发布监拆订单</button>
  </div>
</div>
<script src="../common/script.js"></script>
</body>
</html>
