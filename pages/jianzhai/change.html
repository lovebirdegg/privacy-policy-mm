<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>申请改派</title>
<link rel="stylesheet" href="../common/style.css">
<style>
.status-bar { background: var(--blue); }
.header { background: var(--blue); }
.btn-primary { background: var(--blue); }

/* 任务信息行 */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray);
  font-size: 14px;
}
.info-label { color: var(--text2); }
.info-value { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div class="phone-container">
  <div class="status-bar blue"><span>9:41</span><span>📶 5G 🔋</span></div>
  <div class="header blue">
    <a class="header-back" href="tasks.html">‹</a>
    <span class="header-title">申请改派</span>
    <span style="width:32px"></span>
  </div>

  <div class="scroll-area" style="padding:10px 12px">
    <!-- 任务信息 -->
    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot blue"></span>监拆任务信息</div>
      <div class="info-row">
        <span class="info-label">案件号</span>
        <span class="info-value">JD2026041502</span>
      </div>
      <div class="info-row">
        <span class="info-label">车牌号</span>
        <span class="info-value">鲁A·88888</span>
      </div>
      <div class="info-row">
        <span class="info-label">修理厂</span>
        <span class="info-value">济南万通汽修</span>
      </div>
      <div class="info-row" style="border-bottom:none">
        <span class="info-label">预约时间</span>
        <span class="info-value">04-16 14:00</span>
      </div>
    </div>

    <!-- 改派原因 -->
    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot blue"></span>改派原因</div>
      <div class="form-item">
        <label class="form-label form-label-req">选择改派原因</label>
        <div class="form-select" onclick="showToast('选择改派原因')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item" style="align-items:flex-start;border-bottom:none">
        <label class="form-label">详细说明</label>
        <textarea class="form-textarea" placeholder="请详细说明改派原因..."></textarea>
      </div>
    </div>

    <!-- 新监拆员 -->
    <div class="card" style="margin:0 0 80px">
      <div class="card-title"><span class="card-title-dot blue"></span>新监拆员</div>
      <div class="form-item">
        <label class="form-label form-label-req">选择监拆员</label>
        <div class="form-select" onclick="showToast('选择监拆员')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item" style="border-bottom:none">
        <label class="form-label">新监拆员信息</label>
        <div style="padding:10px;background:#f5f5f5;border-radius:8px;font-size:14px;color:var(--text2)">
          选择监拆员后显示其联系方式和当前任务量
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn btn-full btn-primary" onclick="showToast('改派申请已提交！');setTimeout(()=>location.href='tasks.html',1000)">提交改派申请</button>
  </div>
</div>
<div class="toast"></div>
<script src="../common/script.js"></script>
</body>
</html>
