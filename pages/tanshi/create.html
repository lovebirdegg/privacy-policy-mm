<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人伤发布</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar green"><span>9:41</span><span>📶 5G 🔋</span></div>
  <div class="header green">
    <a class="header-back" href="index.html">‹</a>
    <span class="header-title">人伤发布</span>
    <span style="width:32px"></span>
  </div>

  <div class="scroll-area" style="padding:10px 12px">
    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot green"></span>案件基本信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">报案号</label>
        <input class="form-input" type="text" placeholder="请输入报案号">
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">保险公司</label>
        <div class="form-select" onclick="showToast('选择保险公司')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">事故日期</label>
        <input class="form-input" type="date">
      </div>
      <div class="form-item">
        <label class="form-label">事故地点</label>
        <input class="form-input" type="text" placeholder="请输入事故地点">
      </div>
    </div>

    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot green"></span>伤者信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">伤者姓名</label>
        <input class="form-input" type="text" placeholder="请输入伤者姓名">
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">联系电话</label>
        <input class="form-input" type="tel" placeholder="请输入手机号">
      </div>
      <div class="form-item">
        <label class="form-label">身份证号</label>
        <input class="form-input" type="text" placeholder="请输入身份证号">
      </div>
    </div>

    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot green"></span>就诊信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">就诊医院</label>
        <div class="form-select" onclick="showToast('选择医院')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">科室 / 病区</label>
        <input class="form-input" type="text" placeholder="如：骨科三病区">
      </div>
      <div class="form-item">
        <label class="form-label">床位号</label>
        <input class="form-input" type="text" placeholder="请输入床位号">
      </div>
      <div class="form-item" style="align-items:flex-start;border-bottom:none">
        <label class="form-label">诊断结果</label>
        <textarea class="form-textarea" placeholder="请输入诊断结果"></textarea>
      </div>
    </div>

    <div class="card" style="margin:0 0 80px">
      <div class="card-title"><span class="card-title-dot green"></span>事故经过</div>
      <div class="form-item" style="border-bottom:none">
        <textarea class="form-textarea" placeholder="请简要描述事故经过（选填）"></textarea>
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn btn-full btn-green" onclick="showToast('探视订单已发布！');setTimeout(()=>location.href='index.html',1000)">发布探视订单</button>
  </div>
</div>
<div class="toast"></div>
<script src="../common/script.js"></script>
</body>
</html>
