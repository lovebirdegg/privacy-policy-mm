<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>物损记录</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
  <div class="header">
    <a class="header-back" href="index.html">‹</a>
    <span class="header-title">物损记录</span>
    <span style="width:32px"></span>

  <div class="search-bar">

      <input class="search-input" placeholder="搜索当事人姓名、报案号...">
    </div>
    <div class="filter-row">

        <option>全部类型</option>
        <option>财产损失</option>
        <option>设备损坏</option>
        <option>房屋损坏</option>

        <option>最近30天</option>
        <option>最近7天</option>
        <option>全部时间</option>
      </select>
    </div>
  </div>

  <div class="scroll-area" style="padding:10px 12px">

      <div class="task-info-row"><span class="task-label">完成时间：</span>2026-04-12 10:30</div>

    <a class="task-card status-done" href="detail.html">
      <div class="task-card-header">
        <div class="task-id">李秀梅</div>
        <span class="tag tag-green">已完成</span>
      </div>
      <div class="task-info-row"><span class="task-label">类型：</span>设备损坏</div>
      <div class="task-info-row"><span class="task-label">实际金额：</span><span style="color:var(--orange);font-weight:600">¥7,500</span></div>
      <div class="task-info-row"><span class="task-label">勘察员：</span>张三</div>
      <div class="task-info-row"><span class="task-label">完成时间：</span>2026-04-11 15:20</div>

    <a class="task-card status-done" href="detail.html">
      <div class="task-card-header">
        <div class="task-id">赵志强</div>
        <span class="tag tag-teal">待复勘</span>
      </div>
      <div class="task-info-row"><span class="task-label">类型：</span>房屋损坏</div>
      <div class="task-info-row"><span class="task-label">预估金额：</span><span style="color:var(--orange);font-weight:600">¥35,000</span></div>

      <div class="task-card-header">
        <div class="task-id">孙小明</div>

      <div class="task-info-row"><span class="task-label">完成时间：</span>2026-03-28 16:00</div>

<script src="../common/script.js"></script>
