<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>发布物损订单</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar orange"><span>9:41</span><span>📶 5G 🔋</span></div>
  <div class="header orange">
    <a class="header-back" href="index.html">‹</a>
    <span class="header-title">发布物损订单</span>
    <span style="width:32px"></span>
  </div>

  <div class="scroll-area" style="padding:10px 12px">
    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot orange"></span>案件基本信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">报案号</label>
        <input class="form-input" type="text" placeholder="请输入报案号">
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">保险公司</label>
        <div class="form-select" onclick="showToast('选择保险公司')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">出险日期</label>
        <input class="form-input" type="date">
      </div>
      <div class="form-item">
        <label class="form-label">出险地点</label>
        <input class="form-input" type="text" placeholder="请输入出险地点">
      </div>
      <div class="form-item">
        <label class="form-label">定损员</label>
        <div class="form-select" onclick="showToast('选择定损员')">请选择 <span class="arr">›</span></div>
      </div>
    </div>

    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot orange"></span>当事人信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">当事人姓名</label>
        <input class="form-input" type="text" placeholder="请输入姓名">
      </div>
      <div class="form-item">
        <label class="form-label form-label-req">联系电话</label>
        <input class="form-input" type="tel" placeholder="请输入手机号">
      </div>
      <div class="form-item">
        <label class="form-label">身份证号</label>
        <input class="form-input" type="text" placeholder="请输入身份证号">
      </div>
      <div class="form-item">
        <label class="form-label">银行账号</label>
        <input class="form-input" type="text" placeholder="用于赔付款项（选填）">
      </div>
    </div>

    <div class="card" style="margin:0 0 10px">
      <div class="card-title"><span class="card-title-dot orange"></span>物损信息</div>
      <div class="form-item">
        <label class="form-label form-label-req">物损类型</label>
        <div class="form-select" onclick="showToast('选择物损类型')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item" style="align-items:flex-start">
        <label class="form-label">物损描述</label>
        <textarea class="form-textarea" placeholder="请简要描述物损情况"></textarea>
      </div>
      <div class="form-item">
        <label class="form-label">预估损失金额</label>
        <input class="form-input" type="number" placeholder="请输入预估金额（元）">
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn btn-full btn-orange" onclick="showToast('物损订单已发布！');setTimeout(()=>location.href='index.html',1000)">发布物损订单</button>
  </div>
</div>
<div class="toast"></div>
<script src="../common/script.js"></script>
</body>
</html>
