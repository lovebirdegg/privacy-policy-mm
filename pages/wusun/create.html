<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>发布物损订单</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar" style="background:var(--orange)">
    <span>9:41</span>
    <span>📶 5G 🔋</span>
  </div>
  <div class="header orange">
    <a class="header-back" href="index.html">‹</a>
    <span class="header-title">发布物损订单</span>
    <span class="header-action"></span>
  </div>

  <div class="scroll-area" style="padding:12px 14px">
    <!-- 案件基本信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">案件基本信息</div>
      <div class="form-item">
        <label class="form-label">报案号</label>
        <input class="form-input" type="text" placeholder="请输入报案号">
      </div>
      <div class="form-item">
        <label class="form-label">保险公司</label>
        <div class="form-select" onclick="showToast('选择保险公司')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">出险日期</label>
        <input class="form-input" type="date">
      </div>
      <div class="form-item">
        <label class="form-label">出险地点</label>
        <input class="form-input" type="text" placeholder="请输入出险地点">
      </div>
      <div class="form-item">
        <label class="form-label">定损员</label>
        <input class="form-input" type="text" placeholder="请输入定损员姓名">
      </div>
    </div>

    <!-- 当事人信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">当事人信息</div>
      <div class="form-item">
        <label class="form-label">当事人姓名</label>
        <input class="form-input" type="text" placeholder="请输入姓名">
      </div>
      <div class="form-item">
        <label class="form-label">联系电话</label>
        <input class="form-input" type="tel" placeholder="请输入手机号">
      </div>
      <div class="form-item">
        <label class="form-label">身份证号</label>
        <input class="form-input" type="text" placeholder="请输入身份证号">
      </div>
      <div class="form-item">
        <label class="form-label">银行账号</label>
        <input class="form-input" type="text" placeholder="用于赔付款项">
      </div>
    </div>

    <!-- 物损信息 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">物损信息</div>
      <div class="form-item">
        <label class="form-label">物损类型</label>
        <div class="form-select" onclick="showToast('选择物损类型')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">物损描述</label>
        <textarea class="form-textarea" placeholder="请简要描述物损情况"></textarea>
      </div>
      <div class="form-item">
        <label class="form-label">预估损失金额</label>
        <input class="form-input" type="number" placeholder="请输入预估金额">
      </div>
    </div>

    <!-- 物损清单 -->
    <div class="card" style="margin:0 0 12px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray)">
        <div style="font-weight:700;font-size:14px">物损清单</div>
        <button style="background:var(--orange);color:white;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer" onclick="addWusunItem()">+ 添加物损项</button>
      </div>
      <div id="wusun-items-list">
        <div class="wusun-item" style="border-bottom:1px solid var(--gray)">
          <div class="wusun-header">
            <div class="wusun-name">物损项目 1</div>
            <div style="font-size:12px;color:var(--orange);cursor:pointer">删除</div>
          </div>
          <div style="padding:0 14px 12px">
            <div class="form-item" style="margin-bottom:8px">
              <label class="form-label">物品名称</label>
              <input class="form-input" type="text" placeholder="请输入物品名称">
            </div>
            <div class="form-item" style="margin-bottom:8px">
              <label class="form-label">损坏程度</label>
              <div class="form-select" onclick="showToast('选择损坏程度')">请选择 <span class="arr">›</span></div>
            </div>
            <div class="form-item" style="margin-bottom:8px">
              <label class="form-label">估损金额</label>
              <input class="form-input" type="number" placeholder="请输入金额">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 审批信息 -->
    <div class="card" style="margin:0 0 80px 0">
      <div class="card-title">审批信息</div>
      <div class="form-item">
        <label class="form-label">审批人</label>
        <div class="form-select" onclick="showToast('选择审批人')">请选择 <span class="arr">›</span></div>
      </div>
      <div class="form-item">
        <label class="form-label">备注</label>
        <textarea class="form-textarea" placeholder="填写备注信息（选填）"></textarea>
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn btn-full btn-orange" onclick="showToast('物损订单已发布！');location.href='index.html'">发布物损订单</button>
  </div>
</div>
<script src="../common/script.js"></script>
</body>
</html>
