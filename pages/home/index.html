<!DOCTYPE html>

<meta charset="UTF-8">

<link rel="stylesheet" href="../common/style.css">
<style>
.banner {
  background: linear-gradient(135deg, #2e6cf6 0%, #1a56db 60%, #1344b8 100%);
  padding: 18px 14px 20px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.banner::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 40px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.banner-title {
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  margin-bottom: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  position: relative; z-index: 1;
}
.banner-stats { display: flex; gap: 10px; position: relative; z-index: 1; }
.banner-stat {
  flex: 1;
  background: rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 11px 8px;
  text-align: center;
  backdrop-filter: blur(2px);
}
.banner-stat-num { font-size: 24px; font-weight: 800; color: white; line-height: 1.1; }
.banner-stat-label { font-size: 11px; color: rgba(255,255,255,0.78); margin-top: 3px; }
.home-shortcut-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  text-decoration: none; color: inherit;
  padding: 10px 4px;
  border-radius: 10px;
  transition: background 0.15s;
}
.home-shortcut-item:active { background: var(--gray); }
.home-shortcut-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.home-shortcut-label { font-size: 11px; font-weight: 600; color: var(--text); text-align: center; }
</style>
</head>
