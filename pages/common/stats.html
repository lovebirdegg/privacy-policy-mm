<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>统计报表</title>
<link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="phone-container">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 5G 🔋</span>
  </div>
  <div class="header">
    <a class="header-back" href="../home/index.html">‹</a>
    <span class="header-title">统计报表</span>
    <span class="header-action"></span>
  </div>

  <div class="scroll-area" style="padding:12px 14px">
    <!-- 统计概览 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:white;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
        <div style="font-size:28px;font-weight:700;color:var(--blue)">47</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">车辆监拆</div>
      </div>
      <div style="background:white;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
        <div style="font-size:28px;font-weight:700;color:var(--green)">23</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">住院探视</div>
      </div>
      <div style="background:white;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
        <div style="font-size:28px;font-weight:700;color:var(--orange)">18</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">物损清单</div>
      </div>
      <div style="background:white;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
        <div style="font-size:28px;font-weight:700;color:var(--purple)">88</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">总计</div>
      </div>
    </div>

    <!-- 本月完成情况 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">本月完成情况</div>
      <div style="padding:0 14px 12px">
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
            <span>车辆监拆</span><span style="color:var(--blue);font-weight:600">21 单</span>
          </div>
          <div class="progress">
            <div class="progress-bar blue" style="width:65%"></div>
          </div>
        </div>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
            <span>住院探视</span><span style="color:var(--green);font-weight:600">9 单</span>
          </div>
          <div class="progress">
            <div class="progress-bar green" style="width:40%"></div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
            <span>物损清单</span><span style="color:var(--orange);font-weight:600">7 单</span>
          </div>
          <div class="progress">
            <div class="progress-bar orange" style="width:30%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 效率指标 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">效率指标</div>
      <div class="detail-row"><span class="detail-label">平均处理时长</span><span style="font-weight:600">2.3 小时/单</span></div>
      <div class="detail-row"><span class="detail-label">按时完成率</span><span style="color:var(--green);font-weight:600">96.2%</span></div>
      <div class="detail-row"><span class="detail-label">复勘率</span><span style="color:var(--blue);font-weight:600">8.5%</span></div>
      <div class="detail-row"><span class="detail-label">照片合格率</span><span style="color:var(--green);font-weight:600">99.1%</span></div>
    </div>

    <!-- 个人排名 -->
    <div class="card" style="margin:0 0 12px 0">
      <div class="card-title">个人效率排名</div>
      <div style="padding:0 14px 12px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">🥇</span>
            <span>张三</span>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">21单</div>
            <div style="font-size:11px;color:var(--text3)">平均1.8h</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">🥈</span>
            <span>张三</span>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">18单</div>
            <div style="font-size:11px;color:var(--text3)">平均2.1h</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">🥉</span>
            <span>李四</span>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">9单</div>
            <div style="font-size:11px;color:var(--text3)">平均2.5h</div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:20px"></div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <a class="nav-item" href="../home/index.html">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a class="nav-item" href="cases.html">
      <span class="nav-icon">📋</span>
      <span>案件</span>
    </a>
    <a class="nav-item active" href="stats.html">
      <span class="nav-icon">📊</span>
      <span>统计</span>
    </a>
    <a class="nav-item" href="profile.html">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </div>
</div>
<script src="../common/script.js"></script>
</body>
</html>
